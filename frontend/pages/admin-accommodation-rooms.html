<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin - Manage Accommodation Rooms | GIPS College</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }

        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0f172a;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-outline {
            background: white;
            border: 1px solid #cbd5e1;
            color: #1e293b;
        }

        .btn-outline:hover {
            background: #f8fafc;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th,
        td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            color: #334155;
            font-size: 0.85rem;
        }

        td {
            font-size: 0.85rem;
            color: #1e293b;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-available {
            background: #dcfce7;
            color: #15803d;
        }

        .badge-unavailable {
            background: #fee2e2;
            color: #991b1b;
        }

        .action-icons i {
            font-size: 1.1rem;
            cursor: pointer;
            margin: 0 4px;
            transition: 0.2s;
        }

        .action-icons .edit-icon {
            color: #3b82f6;
        }

        .action-icons .delete-icon {
            color: #ef4444;
        }

        .action-icons i:hover {
            transform: scale(1.05);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #334155;
            font-size: 0.85rem;
        }

        input,
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 12px 0;
        }

        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 1100;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-building"></i> Accommodation Rooms Management</h1>
            <button class="btn btn-primary" id="addRoomBtn"><i class="fas fa-plus"></i> Add New Room</button>
        </div>
        <div class="table-container">
            <table id="roomsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Block</th>
                        <th>Room #</th>
                        <th>Type</th>
                        <th>Capacity</th>
                        <th>Occupants</th>
                        <th>Status</th>
                        <th>Amenities</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="roomsTableBody">
                    <tr>
                        <td colspan="9" class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading rooms...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal for Add/Edit Room -->
    <div id="roomModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Room</h3>
                <span class="close-modal">&times;</span>
            </div>
            <form id="roomForm">
                <input type="hidden" id="roomId">
                <div class="form-group">
                    <label>Block Name *</label>
                    <input type="text" id="blockName" required placeholder="e.g., A, B, C, D, E">
                </div>
                <div class="form-group">
                    <label>Room Number *</label>
                    <input type="text" id="roomNumber" required placeholder="e.g., 101, 102, 201">
                </div>
                <div class="form-group">
                    <label>Room Type *</label>
                    <select id="roomType" required>
                        <option value="bachelor_pad">Bachelor Pad (2 students)</option>
                        <option value="three_bed">Three-Bed Room (6 students)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Capacity *</label>
                    <input type="number" id="capacity" required min="1" max="10">
                </div>
                <div class="form-group">
                    <label>Current Occupants</label>
                    <input type="number" id="currentOccupants" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Availability</label>
                    <select id="isAvailable">
                        <option value="true">Available</option>
                        <option value="false">Unavailable (Maintenance/Full)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amenities</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="hasKitchen"> Kitchen</label>
                        <label><input type="checkbox" id="hasShower"> Shower</label>
                        <label><input type="checkbox" id="hasStudyTable"> Study Table</label>
                        <label><input type="checkbox" id="hasBed"> Bed</label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="cancelModalBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Room</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast-message"></div>

    <script>
        // ========== AUTH ==========
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // Helper: API call with auth
        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            };
            if (body) options.body = JSON.stringify(body);
            try {
                const response = await fetch(`/api/accommodation${endpoint}`, options);
                if (response.status === 401) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                    return null;
                }
                return response;
            } catch (err) {
                console.error('API call error:', err);
                showToast('Network error', 'error');
                return null;
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Load rooms and render table
        async function loadRooms() {
            const tbody = document.getElementById('roomsTableBody');
            tbody.innerHTML = '<tr><td colspan="9" class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading...</td></tr>';

            const response = await apiCall('/admin/rooms', 'GET');
            if (!response || !response.ok) {
                tbody.innerHTML = '<tr><td colspan="9">Failed to load rooms. Please refresh.</td></tr>';
                return;
            }
            const rooms = await response.json();
            if (!rooms.length) {
                tbody.innerHTML = '<tr><td colspan="9">No rooms found. Click "Add New Room" to create one.</td></tr>';
                return;
            }

            tbody.innerHTML = rooms.map(room => `
            <tr>
                <td>${room.id}</td>
                <td>${escapeHtml(room.block_name)}</td>
                <td>${escapeHtml(room.room_number)}</td>
                <td>${room.room_type === 'bachelor_pad' ? 'Bachelor Pad' : 'Three-Bed'}</td>
                <td>${room.capacity}</td>
                <td>${room.current_occupants}</td>
                <td><span class="badge ${room.is_available ? 'badge-available' : 'badge-unavailable'}">${room.is_available ? 'Available' : 'Unavailable'}</span></td>
                <td>
                    ${room.has_kitchen ? '<i class="fas fa-utensils" title="Kitchen"></i>' : ''}
                    ${room.has_shower ? '<i class="fas fa-shower" title="Shower"></i>' : ''}
                    ${room.has_study_table ? '<i class="fas fa-book" title="Study Table"></i>' : ''}
                    ${room.has_bed ? '<i class="fas fa-bed" title="Bed"></i>' : ''}
                </td>
                <td class="action-icons">
                    <i class="fas fa-edit edit-icon" onclick="editRoom(${room.id})" title="Edit"></i>
                    <i class="fas fa-trash-alt delete-icon" onclick="deleteRoom(${room.id})" title="Delete"></i>
                </td>
            </tr>
        `).join('');
        }

        // Open modal for adding new room
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add New Room';
            document.getElementById('roomForm').reset();
            document.getElementById('roomId').value = '';
            document.getElementById('capacity').value = '';
            document.getElementById('currentOccupants').value = 0;
            document.getElementById('isAvailable').value = 'true';
            document.getElementById('hasKitchen').checked = true;
            document.getElementById('hasShower').checked = true;
            document.getElementById('hasStudyTable').checked = true;
            document.getElementById('hasBed').checked = true;
            document.getElementById('roomModal').style.display = 'flex';
        }

        // Edit existing room
        async function editRoom(id) {
            const response = await apiCall(`/admin/rooms/${id}`, 'GET');
            if (!response || !response.ok) {
                showToast('Failed to fetch room details', 'error');
                return;
            }
            const room = await response.json();
            document.getElementById('modalTitle').innerText = 'Edit Room';
            document.getElementById('roomId').value = room.id;
            document.getElementById('blockName').value = room.block_name;
            document.getElementById('roomNumber').value = room.room_number;
            document.getElementById('roomType').value = room.room_type;
            document.getElementById('capacity').value = room.capacity;
            document.getElementById('currentOccupants').value = room.current_occupants;
            document.getElementById('isAvailable').value = room.is_available ? 'true' : 'false';
            document.getElementById('hasKitchen').checked = room.has_kitchen;
            document.getElementById('hasShower').checked = room.has_shower;
            document.getElementById('hasStudyTable').checked = room.has_study_table;
            document.getElementById('hasBed').checked = room.has_bed;
            document.getElementById('roomModal').style.display = 'flex';
        }

        // Delete room
        async function deleteRoom(id) {
            if (!confirm('Delete this room? This action cannot be undone if there are no active allocations.')) return;
            const response = await apiCall(`/admin/rooms/${id}`, 'DELETE');
            if (response && response.ok) {
                showToast('Room deleted successfully');
                loadRooms();
            } else {
                const error = await response?.json();
                showToast(error?.error || 'Failed to delete room', 'error');
            }
        }

        // Handle form submission (Add/Edit)
        document.getElementById('roomForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const roomId = document.getElementById('roomId').value;
            const payload = {
                block_name: document.getElementById('blockName').value.trim(),
                room_number: document.getElementById('roomNumber').value.trim(),
                room_type: document.getElementById('roomType').value,
                capacity: parseInt(document.getElementById('capacity').value),
                current_occupants: parseInt(document.getElementById('currentOccupants').value),
                is_available: document.getElementById('isAvailable').value === 'true',
                has_kitchen: document.getElementById('hasKitchen').checked,
                has_shower: document.getElementById('hasShower').checked,
                has_study_table: document.getElementById('hasStudyTable').checked,
                has_bed: document.getElementById('hasBed').checked
            };
            if (!payload.block_name || !payload.room_number || isNaN(payload.capacity)) {
                showToast('Please fill all required fields', 'error');
                return;
            }
            let response;
            if (roomId) {
                response = await apiCall(`/admin/rooms/${roomId}`, 'PUT', payload);
            } else {
                response = await apiCall('/admin/rooms', 'POST', payload);
            }
            if (response && response.ok) {
                showToast(roomId ? 'Room updated successfully' : 'Room created successfully');
                closeModal();
                loadRooms();
            } else {
                const err = await response?.json();
                showToast(err?.error || 'Operation failed', 'error');
            }
        });

        function closeModal() {
            document.getElementById('roomModal').style.display = 'none';
        }

        // Helper to escape HTML for safe rendering
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Event listeners
        document.getElementById('addRoomBtn').addEventListener('click', openAddModal);
        document.querySelectorAll('.close-modal, #cancelModalBtn').forEach(btn => {
            btn.addEventListener('click', closeModal);
        });
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('roomModal')) closeModal();
        });

        // Load rooms on page load
        loadRooms();
    </script>
</body>

</html>
