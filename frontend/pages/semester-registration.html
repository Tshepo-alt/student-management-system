<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Semester Registration · GIPS College</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #f4f7fc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            background: #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            padding: 0.9rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(102,126,234,0.15);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 30px;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
        }

        .navbar-brand img {
            height: 44px;
            width: auto;
            border-radius: 8px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #2d3a4a;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            transition: all 0.2s;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
        }

        .nav-link i {
            font-size: 1rem;
            color: #667eea;
        }

        .nav-link:hover {
            background: #eef2ff;
            color: #4f46e5;
        }

        .nav-link.active {
            background: #667eea10;
            color: #4f46e5;
            font-weight: 600;
        }

        /* MAIN CONTENT */
        .registration-wrapper {
            flex: 1;
            padding: 40px 0;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 32px 30px;
            margin-bottom: 30px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04), 0 0 0 1px rgba(102,126,234,0.06);
            transition: box-shadow 0.2s;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 2px solid #eef2ff;
            padding-bottom: 18px;
        }

        .card-header i {
            font-size: 1.8rem;
            color: #667eea;
            background: #eef2ff;
            padding: 10px;
            border-radius: 16px;
        }

        .card-header h2 {
            font-size: 1.7rem;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: -0.01em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            background: #fafbff;
            padding: 22px 24px;
            border-radius: 22px;
            margin-bottom: 20px;
        }

        .info-item label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
        }

        .info-item span {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-sponsor {
            background: #dbeafe;
            color: #1e4bd2;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* courses grid */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin: 24px 0 20px;
        }

        .course-card {
            background: #f9fafc;
            border: 1.5px solid #e9eef4;
            border-radius: 20px;
            padding: 18px 18px 18px 20px;
            transition: all 0.15s;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .course-card:hover {
            border-color: #a5b4fc;
            background: #ffffff;
            box-shadow: 0 6px 12px -6px rgba(79, 70, 229, 0.08);
            transform: translateY(-1px);
        }

        .course-card.selected {
            border-color: #667eea;
            background: #f5f7ff;
            box-shadow: 0 8px 16px -8px rgba(102,126,234,0.2);
        }

        .course-card input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #667eea;
            margin-top: 2px;
            cursor: pointer;
        }

        .course-info {
            flex: 1;
        }

        .course-code {
            font-weight: 700;
            color: #4f46e5;
            font-size: 0.9rem;
            letter-spacing: -0.2px;
        }

        .course-name {
            font-weight: 600;
            font-size: 1.05rem;
            margin: 5px 0 6px;
            color: #1e293b;
        }

        .course-meta {
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            color: #5e6f8b;
        }

        .course-meta i {
            margin-right: 4px;
            color: #667eea;
        }

        /* fee section */
        .fee-panel {
            background: #f0f4fe;
            border-radius: 24px;
            padding: 24px 26px;
            margin: 20px 0 24px;
        }

        .fee-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #cbd5e1;
            font-size: 1rem;
        }

        .fee-row:last-of-type {
            border-bottom: none;
        }

        .fee-total {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2.5px solid #667eea;
            font-weight: 700;
            font-size: 1.3rem;
            color: #1e293b;
            display: flex;
            justify-content: space-between;
        }

        .gov-note {
            background: #d9f0ec;
            color: #0b6b5c;
            padding: 16px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* accommodation block */
        .accommodation-box {
            background: #e9effa;
            border-radius: 24px;
            padding: 24px 26px;
            margin: 24px 0 20px;
            border-left: 6px solid #4f46e5;
        }

        .accommodation-box h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            margin-bottom: 18px;
            color: #1e293b;
        }

        .checkbox-accommodation {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            padding: 8px 0;
        }

        .checkbox-accommodation input {
            width: 22px;
            height: 22px;
            accent-color: #4f46e5;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            color: #1e293b;
            border: 1px solid #d0d9e8;
        }

        .btn-primary {
            background: linear-gradient(145deg, #4f46e5, #667eea);
            color: white;
            border: none;
            box-shadow: 0 10px 18px -8px #4f46e580;
        }

        .btn-primary:hover:not(:disabled) {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 16px 24px -8px #4f46e5b3;
        }

        .btn-secondary {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
            font-size: 1.2rem;
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 18px 22px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .footer {
            background: #13202e;
            color: #e2e8f0;
            padding: 30px 0;
            text-align: center;
            margin-top: 30px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        @media (max-width: 640px) {
            .container { padding: 0 18px; }
            .navbar .container { flex-direction: column; }
            .nav-menu { justify-content: center; }
            .card { padding: 24px 18px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <div class="navbar-brand">
            <img src="../images/gipslogo.jpg" alt="GIPS College Logo" id="logoImage"
                 onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<span style=\'font-weight:700;font-size:1.4rem;color:#1e293b;\'>GIPS College</span>')">
        </div>
        <ul class="nav-menu">
            <li><a href="student-dashboard.html" class="nav-link"><i class="fas fa-chalkboard"></i> Dashboard</a></li>
            <li><a href="semester-registration.html" class="nav-link active"><i class="fas fa-pen-to-square"></i> Semester Registration</a></li>
            <li><a href="chatbot.html" class="nav-link"><i class="fas fa-headset"></i> Support</a></li>
            <li><a href="#" id="logoutLink" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </div>
</nav>

<div class="registration-wrapper">
    <div class="container" id="registrationContainer">
        <!-- dynamic content injected -->
        <div class="loading-state">
            <i class="fas fa-spinner fa-pulse fa-2x" style="color:#667eea; margin-bottom:16px; display:block;"></i>
            Loading your registration data…
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p><i class="fas fa-graduation-cap"></i> &copy; 2026 GIPS College. Academic Affairs</p>
        <p style="margin-top:8px; opacity:0.8;">Secure Semester Registration · Student Portal</p>
    </div>
</footer>

<script>
    (function(){
        "use strict";

        // ---------- CONFIG ----------
        const API_BASE = '';  // relative paths
        const TOKEN_KEY = 'access_token';

        // Fee constants (matching backend: 630 reg, 32550 tuition, 5145 exam per module)
        const FEE_REGISTRATION = 630;
        const FEE_TUITION = 32550;
        const FEE_EXAM_PER_MODULE = 5145;

        // ---------- GLOBAL STATE ----------
        let studentProfile = null;
        let campusDetails = null;        // fetched if needed
        let availableCourses = [];
        let selectedCourseIds = new Set();
        let wantsAccommodation = false;

        // DOM elements
        const container = document.getElementById('registrationContainer');

        // ---------- HELPER: API CALL WITH AUTH ----------
        async function apiCall(endpoint, options = {}) {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) {
                window.location.href = 'login.html';
                throw new Error('No token');
            }
            const headers = {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                ...(options.headers || {})
            };
            try {
                const resp = await fetch(endpoint, { ...options, headers });
                if (resp.status === 401) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                    throw new Error('Session expired');
                }
                return resp;
            } catch (error) {
                console.error('API error:', error);
                throw error;
            }
        }

        // safe json parse
        async function fetchJson(endpoint, options = {}) {
            const resp = await apiCall(endpoint, options);
            if (!resp.ok) {
                const errText = await resp.text();
                let errMsg = errText;
                try { const j = JSON.parse(errText); errMsg = j.error || j.message || errText; } catch(e) {}
                throw new Error(errMsg || `Request failed (${resp.status})`);
            }
            return resp.json();
        }

        // ---------- FETCH CAMPUS DETAILS (to check accommodation) ----------
        async function fetchCampusIfNeeded(campusId) {
            if (!campusId) return null;
            try {
                // Try common campus endpoint (adjust if needed)
                return await fetchJson(`/api/campuses/${campusId}`);
            } catch (e) {
                console.warn('Campus details not available, assuming no accommodation info', e);
                return null;
            }
        }

        // ---------- LOAD STUDENT PROFILE ----------
        async function loadStudentProfile() {
            const data = await fetchJson('/api/students/profile');
            studentProfile = data;
            // If campus_id present, fetch campus details for accommodation flag
            if (studentProfile.campus_id) {
                campusDetails = await fetchCampusIfNeeded(studentProfile.campus_id);
            }
            return data;
        }

        // ---------- CHECK EXISTING REGISTRATION ----------
        async function checkExistingRegistration() {
            try {
                const reg = await fetchJson('/api/students/current-registration');
                if (reg.has_registration && reg.status && reg.status !== 'rejected') {
                    if (reg.status === 'approved' || reg.status === 'completed') {
                        window.location.href = 'student-dashboard.html';
                        return true;
                    } else if (reg.status === 'pending') {
                        window.location.href = 'registration-waiting.html';
                        return true;
                    }
                }
                return false;
            } catch (e) {
                console.warn('Registration check failed, proceeding', e);
                return false;
            }
        }

        // ---------- LOAD AVAILABLE COURSES ----------
        async function loadAvailableCourses(programId) {
            try {
                const courses = await fetchJson(`/api/students/available-courses?program_id=${programId}`);
                if (Array.isArray(courses) && courses.length) {
                    availableCourses = courses;
                } else {
                    // fallback demo (shouldn't happen in prod)
                    availableCourses = [
                        { id: 101, code: 'CS101', name: 'Programming Fundamentals', credits: 12, semester: 1, year_level: 1 },
                        { id: 102, code: 'CS102', name: 'Computer Architecture', credits: 12, semester: 1, year_level: 1 },
                        { id: 103, code: 'MATH101', name: 'Discrete Mathematics', credits: 12, semester: 1, year_level: 1 },
                    ];
                }
                return availableCourses;
            } catch (e) {
                showError('Could not load available courses. ' + e.message);
                throw e;
            }
        }

        // ---------- RENDER UI ----------
        function renderUI() {
            if (!studentProfile) return;

            const isGov = studentProfile.is_government_sponsored || false;
            const programName = studentProfile.program_name || 'N/A';
            const studentNumber = studentProfile.student_number || '—';
            const fullName = `${studentProfile.first_name || ''} ${studentProfile.last_name || ''}`.trim();

            // Check if campus has accommodation (from campusDetails)
            const campusHasAccommodation = campusDetails?.has_accommodation === true;

            // Accommodation eligibility: government sponsored AND campus has accommodation
            const canApplyAccommodation = isGov && campusHasAccommodation;

            // ---- Build HTML ----
            let html = `
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-user-graduate"></i>
                        <h2>Semester Registration</h2>
                    </div>
                    <div class="info-grid">
                        <div class="info-item"><label><i class="fas fa-id-card"></i> Student No.</label><span>${escapeHtml(studentNumber)}</span></div>
                        <div class="info-item"><label><i class="fas fa-user"></i> Name</label><span>${escapeHtml(fullName)}</span></div>
                        <div class="info-item"><label><i class="fas fa-graduation-cap"></i> Program</label><span>${escapeHtml(programName)}</span></div>
                        <div class="info-item"><label><i class="fas fa-layer-group"></i> Year</label><span>Year ${studentProfile.current_year || 1}</span></div>
                        <div class="info-item"><label><i class="fas fa-calendar"></i> Semester</label><span>First Semester (2025/2026)</span></div>
                        <div class="info-item"><label><i class="fas fa-hand-holding-heart"></i> Sponsorship</label>
                            <span>${isGov ? '<span class="badge-sponsor"><i class="fas fa-shield"></i> Government Sponsored</span>' : '<span class="badge-sponsor" style="background:#e9eef4;">Self Sponsored</span>'}</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-book-open"></i>
                        <h2>Select Your Modules</h2>
                    </div>
                    <div id="coursesArea">
                        ${renderCoursesGrid()}
                    </div>

                    <!-- Fee breakdown -->
                    ${renderFeePanel(isGov)}

                    <!-- Accommodation section (conditional) -->
                    ${canApplyAccommodation ? renderAccommodationBlock() : ''}

                    <div class="action-buttons">
                        <button class="btn btn-secondary" id="backBtn"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
                        <button class="btn btn-primary" id="submitRegistrationBtn"><i class="fas fa-paper-plane"></i> Submit Registration</button>
                    </div>
                    <div id="formFeedback" style="margin-top:16px;"></div>
                </div>
            `;
            container.innerHTML = html;

            // Attach event listeners after render
            attachCourseCheckboxListeners();
            document.getElementById('backBtn').addEventListener('click', () => {
                window.location.href = 'student-dashboard.html';
            });
            document.getElementById('submitRegistrationBtn').addEventListener('click', submitRegistration);

            // Accommodation checkbox listener if exists
            const accCheck = document.getElementById('accommodationCheckbox');
            if (accCheck) {
                accCheck.addEventListener('change', (e) => {
                    wantsAccommodation = e.target.checked;
                    const detailDiv = document.getElementById('accommodationExtra');
                    if (detailDiv) detailDiv.style.display = wantsAccommodation ? 'block' : 'none';
                });
            }

            // Update fee display
            updateFeeDisplay();
        }

        function renderCoursesGrid() {
            if (!availableCourses.length) {
                return `<div class="error-message"><i class="fas fa-exclamation-circle"></i> No courses available for your program/year.</div>`;
            }
            let grid = '<div class="course-grid">';
            availableCourses.forEach(course => {
                const checked = selectedCourseIds.has(course.id) ? 'checked' : '';
                const selectedClass = selectedCourseIds.has(course.id) ? 'selected' : '';
                grid += `
                    <label class="course-card ${selectedClass}">
                        <input type="checkbox" value="${course.id}" data-credits="${course.credits || 0}" ${checked} class="course-checkbox">
                        <div class="course-info">
                            <div class="course-code">${escapeHtml(course.code || '')}</div>
                            <div class="course-name">${escapeHtml(course.name || '')}</div>
                            <div class="course-meta">
                                <span><i class="fas fa-star"></i> ${course.credits || 0} credits</span>
                                <span><i class="fas fa-flask"></i> ${course.has_practicals ? 'Practical' : 'Theory'}</span>
                            </div>
                        </div>
                    </label>
                `;
            });
            grid += '</div>';
            return grid;
        }

        function renderFeePanel(isGov) {
            const selectedCount = selectedCourseIds.size;
            const regFee = isGov ? 0 : FEE_REGISTRATION;
            const tuition = isGov ? 0 : FEE_TUITION;
            const examFeePer = isGov ? 0 : FEE_EXAM_PER_MODULE;
            const examTotal = selectedCount * examFeePer;
            const total = regFee + tuition + examTotal;

            if (isGov) {
                return `
                    <div class="gov-note">
                        <i class="fas fa-hand-holding-heart fa-lg"></i>
                        <span><strong>Government sponsored:</strong> Registration & tuition fees are exempt. No exam fees apply.</span>
                    </div>
                    <div class="fee-panel">
                        <div class="fee-row"><span>Registration Fee</span><span>P 0.00 (exempted)</span></div>
                        <div class="fee-row"><span>Tuition Fee</span><span>P 0.00 (exempted)</span></div>
                        <div class="fee-row" id="examFeeDisplay"><span>Exam Fees (${selectedCount} module${selectedCount!==1?'s':''})</span><span>P 0.00</span></div>
                        <div class="fee-total" id="totalFeeDisplay"><span>Total Due</span><span>P 0.00</span></div>
                    </div>
                `;
            } else {
                return `
                    <div class="fee-panel">
                        <div class="fee-row"><span>Registration Fee</span><span>P ${regFee.toFixed(2)}</span></div>
                        <div class="fee-row"><span>Tuition Fee (per semester)</span><span>P ${tuition.toFixed(2)}</span></div>
                        <div class="fee-row" id="examFeeDisplay"><span>Exam Fees (${selectedCount} module${selectedCount!==1?'s':''})</span><span>P ${examTotal.toFixed(2)}</span></div>
                        <div class="fee-total" id="totalFeeDisplay"><span>Total Fees Due</span><span>P ${total.toFixed(2)}</span></div>
                    </div>
                `;
            }
        }

        function renderAccommodationBlock() {
            return `
                <div class="accommodation-box">
                    <h3><i class="fas fa-building"></i> On‑Campus Accommodation</h3>
                    <p style="margin-bottom:16px;"><i class="fas fa-check-circle" style="color:#2b6e4f;"></i> GIPS Student Village available. Government-sponsored students may apply.</p>
                    <label class="checkbox-accommodation">
                        <input type="checkbox" id="accommodationCheckbox">
                        <span><strong>Yes, I wish to apply for accommodation</strong> (Bachelor Pad / shared rooms)</span>
                    </label>
                    <div id="accommodationExtra" style="display:none; margin-top:16px; background:#ffffff90; border-radius:18px; padding:16px;">
                        <p><i class="fas fa-bed"></i> Room types: Bachelor Pad (2 students) · 3-Bed Room (6 students). Allocation after approval.</p>
                    </div>
                </div>
            `;
        }

        // simple escape
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>"]/g, function(c) {
                if (c === '&') return '&amp;';
                if (c === '<') return '&lt;';
                if (c === '>') return '&gt;';
                if (c === '"') return '&quot;';
                return c;
            });
        }

        // Attach listeners to checkboxes (update selection + fee)
        function attachCourseCheckboxListeners() {
            document.querySelectorAll('.course-checkbox').forEach(cb => {
                cb.addEventListener('change', function(e) {
                    const courseId = parseInt(this.value);
                    const card = this.closest('.course-card');
                    if (this.checked) {
                        selectedCourseIds.add(courseId);
                        card.classList.add('selected');
                    } else {
                        selectedCourseIds.delete(courseId);
                        card.classList.remove('selected');
                    }
                    updateFeeDisplay();
                });
            });
        }

        function updateFeeDisplay() {
            const isGov = studentProfile?.is_government_sponsored || false;
            const selectedCount = selectedCourseIds.size;
            const examFeePer = isGov ? 0 : FEE_EXAM_PER_MODULE;
            const examTotal = selectedCount * examFeePer;
            const regFee = isGov ? 0 : FEE_REGISTRATION;
            const tuition = isGov ? 0 : FEE_TUITION;
            const total = regFee + tuition + examTotal;

            const examSpan = document.getElementById('examFeeDisplay');
            const totalSpan = document.getElementById('totalFeeDisplay');
            if (examSpan) {
                examSpan.innerHTML = `<span>Exam Fees (${selectedCount} module${selectedCount!==1?'s':''})</span><span>P ${examTotal.toFixed(2)}</span>`;
            }
            if (totalSpan) {
                totalSpan.innerHTML = `<span>Total ${isGov ? 'Due' : 'Fees Due'}</span><span>P ${total.toFixed(2)}</span>`;
            }
        }

        // ---------- SUBMIT ----------
        async function submitRegistration() {
            if (!studentProfile) {
                alert('Student data not loaded.');
                return;
            }
            if (selectedCourseIds.size === 0) {
                alert('Please select at least one module.');
                return;
            }

            const btn = document.getElementById('submitRegistrationBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';

            const feedbackDiv = document.getElementById('formFeedback');
            feedbackDiv.innerHTML = '';

            try {
                const courseIds = Array.from(selectedCourseIds);
                const payload = {
                    course_ids: courseIds,
                    semester: 1,                     // default first semester; could be made dynamic
                    wants_accommodation: wantsAccommodation
                };

                const resp = await fetchJson('/api/students/register-semester', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                // success
                feedbackDiv.innerHTML = `<div style="background:#d1fae5; color:#065f46; padding:14px 20px; border-radius:20px;"><i class="fas fa-check-circle"></i> Registration submitted! Redirecting…</div>`;
                setTimeout(() => {
                    window.location.href = 'registration-waiting.html';
                }, 1500);
            } catch (error) {
                console.error(error);
                feedbackDiv.innerHTML = `<div class="error-message"><i class="fas fa-times-circle"></i> ${error.message}</div>`;
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function showError(message) {
            container.innerHTML = `<div class="card"><div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${escapeHtml(message)}</div>
            <button class="btn btn-secondary" onclick="location.reload()">Retry</button></div>`;
        }

        // ---------- INIT FLOW ----------
        async function initialize() {
            try {
                // 1. Load student profile
                await loadStudentProfile();

                // 2. Check if already registered
                const hasExisting = await checkExistingRegistration();
                if (hasExisting) return; // redirected

                // 3. Admission status check
                if (studentProfile.admission_status !== 'accepted') {
                    showError('Your admission has not been accepted yet. You cannot register at this time.');
                    return;
                }

                // 4. Load courses
                await loadAvailableCourses(studentProfile.program_id);

                // 5. Render
                renderUI();
            } catch (err) {
                console.error(err);
                showError('Failed to initialize registration: ' + err.message);
            }
        }

        // Logout
        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'login.html';
        });

        // Start
        initialize();
    })();
</script>
</body>
</html>
