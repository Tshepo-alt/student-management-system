<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Student Management - Admin | GIPS College</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            overflow-x: hidden;
        }

        /* Sidebar (same as other admin pages) */
        .admin-wrapper {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 260px;
            }

            .sidebar.open {
                transform: translateX(0);
            }
        }

        .sidebar-header {
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header img {
            height: 55px;
            width: auto;
            margin-bottom: 12px;
        }

        .sidebar-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .sidebar-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #cbd5e1;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
            border-left: 3px solid transparent;
        }

        .sidebar-menu-item i {
            width: 24px;
            font-size: 1.1rem;
            text-align: center;
        }

        .sidebar-menu-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .sidebar-menu-item.active {
            background: rgba(102, 126, 234, 0.2);
            color: white;
            border-left-color: #667eea;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 20px 24px;
            transition: margin-left 0.3s;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 16px;
            }
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            background: white;
            padding: 16px 24px;
            border-radius: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
        }

        .page-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .page-title p {
            color: #475569;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .admin-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .admin-avatar:hover {
            transform: scale(1.03);
        }

        /* Hamburger Button */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #1e293b;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .top-bar {
                padding: 12px 16px;
            }
        }

        /* Content Card */
        .content-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .card-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Search & Buttons */
        .search-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-bar input {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 0.85rem;
            width: 240px;
            background: #f8fafc;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        /* Table */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.85rem;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
        }

        tr:hover {
            background: #f8fafc;
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-approved,
        .status-accepted {
            background: #dcfce7;
            color: #15803d;
        }

        .status-pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            position: relative;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 1.4rem;
            cursor: pointer;
            color: #94a3b8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #334155;
            font-size: 0.85rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .status-message {
            margin-bottom: 20px;
        }

        .alert {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid;
        }

        .alert-success {
            background: #dcfce7;
            color: #15803d;
            border-left-color: #22c55e;
        }

        .alert-error {
            background: #fee2e2;
            color: #b91c1c;
            border-left-color: #ef4444;
        }

        .alert-info {
            background: #e0f2fe;
            color: #0369a1;
            border-left-color: #0ea5e9;
        }

        .footer {
            text-align: center;
            padding: 24px 0;
            margin-top: 32px;
            color: #64748b;
            font-size: 0.75rem;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 640px) {
            .card-header {
                flex-direction: column;
                align-items: stretch;
            }

            .search-bar {
                width: 100%;
                flex-direction: column;
            }

            .search-bar input {
                width: 100%;
            }

            .btn {
                justify-content: center;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="admin-wrapper">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../images/gipslogo.jpg" alt="GIPS College" onerror="this.style.display='none'">
                <h3 id="portalTitle">Admin Portal</h3>
                <p>GIPS College</p>
            </div>
            <div class="sidebar-menu" id="sidebarMenu"></div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                    <div class="page-title">
                        <h1><i class="fas fa-users"></i> Student Management</h1>
                        <p>Manage student records, registrations, and approvals</p>
                    </div>
                </div>
                <div class="admin-avatar" id="adminAvatar">A</div>
            </div>

            <div id="statusMessage" class="status-message"></div>

            <div class="content-card">
                <div class="card-header">
                    <h2><i class="fas fa-user-graduate"></i> All Students</h2>
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search by name, email, student #...">
                        <button class="btn btn-primary" onclick="searchStudents()"><i class="fas fa-search"></i>
                            Search</button>
                        <button class="btn btn-primary" onclick="openAddStudentModal()"><i class="fas fa-plus"></i> Add
                            Student</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Student #</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Program</th>
                                <th>Admission</th>
                                <th>Registration</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentsTableBody">
                            <tr>
                                <td colspan="8">
                                    <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading students...
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="footer">© 2026 GIPS College. All rights reserved.</div>
        </div>
    </div>

    <!-- Add Student Modal -->
    <div id="addStudentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addStudentModal')">&times;</span>
            <h2><i class="fas fa-user-plus"></i> Add New Student</h2>
            <form id="addStudentForm">
                <div class="form-row">
                    <div class="form-group"><label>First Name *</label><input type="text" id="firstName" required></div>
                    <div class="form-group"><label>Last Name *</label><input type="text" id="lastName" required></div>
                </div>
                <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="phone"></div>
                <div class="form-group"><label>Program *</label><select id="programId" required></select></div>
                <div class="form-group"><label>Password *</label><input type="password" id="password" required></div>
                <div class="form-group"><label>Admission Status</label>
                    <select id="admissionStatus">
                        <option value="accepted">Accepted</option>
                        <option value="pending">Pending</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%"><i class="fas fa-save"></i> Create
                    Student</button>
            </form>
        </div>
    </div>

    <!-- Edit Student Modal -->
    <div id="editStudentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editStudentModal')">&times;</span>
            <h2><i class="fas fa-edit"></i> Edit Student</h2>
            <form id="editStudentForm">
                <input type="hidden" id="editStudentId">
                <div class="form-row">
                    <div class="form-group"><label>First Name</label><input type="text" id="editFirstName" required>
                    </div>
                    <div class="form-group"><label>Last Name</label><input type="text" id="editLastName" required></div>
                </div>
                <div class="form-group"><label>Email</label><input type="email" id="editEmail" required></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="editPhone"></div>
                <div class="form-group"><label>Program</label><select id="editProgramId" required></select></div>
                <div class="form-group"><label>Admission Status</label>
                    <select id="editAdmissionStatus">
                        <option value="accepted">Accepted</option>
                        <option value="pending">Pending</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div class="form-group"><label>Academic Status</label>
                    <select id="editAcademicStatus">
                        <option value="good_standing">Good Standing</option>
                        <option value="probation">Probation</option>
                        <option value="suspended">Suspended</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%"><i class="fas fa-save"></i> Update
                    Student</button>
            </form>
        </div>
    </div>

    <script>
        // ========== AUTHENTICATION & ROLE SETUP ==========
        const token = localStorage.getItem('access_token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token) window.location.href = 'login.html';
        const allowedRoles = ['admin', 'administrator', 'registrar'];
        if (!allowedRoles.includes(user.role)) window.location.href = 'student-dashboard.html';

        // Portal title & sidebar based on role
        const portalTitle = document.getElementById('portalTitle');
        const sidebarMenu = document.getElementById('sidebarMenu');
        if (user.role === 'registrar') {
            portalTitle.textContent = 'Registrar Portal';
            sidebarMenu.innerHTML = `
            <a href="registrar-dashboard.html" class="sidebar-menu-item"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="admin-students.html" class="sidebar-menu-item active"><i class="fas fa-users"></i> Students</a>
            <a href="admin-programs.html" class="sidebar-menu-item"><i class="fas fa-book-open"></i> Programs</a>
            <a href="admin-modules.html" class="sidebar-menu-item"><i class="fas fa-layer-group"></i> Modules</a>
            <a href="admin-reports.html" class="sidebar-menu-item"><i class="fas fa-chart-line"></i> Reports</a>
            <a href="#" id="logoutLink" class="sidebar-menu-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
        `;
        } else {
            portalTitle.textContent = 'Admin Portal';
            sidebarMenu.innerHTML = `
            <a href="admin-dashboard.html" class="sidebar-menu-item"><i class="fas fa-chalkboard"></i> Dashboard</a>
            <a href="admin-students.html" class="sidebar-menu-item active"><i class="fas fa-users"></i> Students</a>
            <a href="admin-staff.html" class="sidebar-menu-item"><i class="fas fa-user-tie"></i> Staff</a>
            <a href="admin-programs.html" class="sidebar-menu-item"><i class="fas fa-book-open"></i> Programs</a>
            <a href="admin-modules.html" class="sidebar-menu-item"><i class="fas fa-layer-group"></i> Modules</a>
            <a href="admin-accommodation.html" class="sidebar-menu-item"><i class="fas fa-building"></i> Accommodation</a>
            <a href="admin-payments.html" class="sidebar-menu-item"><i class="fas fa-credit-card"></i> Payments</a>
            <a href="admin-tickets.html" class="sidebar-menu-item"><i class="fas fa-ticket-alt"></i> Tickets</a>
            <a href="admin-reports.html" class="sidebar-menu-item"><i class="fas fa-chart-line"></i> Reports</a>
            <div style="margin: 12px 20px; border-top: 1px solid #334155;"></div>
            <a href="admin-api.html" class="sidebar-menu-item"><i class="fas fa-plug"></i> API</a>
            <a href="admin-settings.html" class="sidebar-menu-item"><i class="fas fa-cog"></i> Settings</a>
            <a href="admin-profile.html" class="sidebar-menu-item"><i class="fas fa-user-circle"></i> Profile</a>
            <a href="#" id="logoutLink" class="sidebar-menu-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
        `;
        }

        // Avatar
        const initial = (user.first_name?.[0] || user.username?.[0] || 'A').toUpperCase();
        document.getElementById('adminAvatar').textContent = initial;

        // Mobile sidebar toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== menuToggle) {
                sidebar.classList.remove('open');
            }
        });

        // ========== API HELPER ==========
        async function safeApiCall(endpoint, options = {}) {
            try {
                const res = await fetch(endpoint, {
                    ...options,
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }
                });
                if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return null; }
                return res;
            } catch (err) { console.error(err); return null; }
        }

        function showMessage(msg, type = 'success') {
            const container = document.getElementById('statusMessage');
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle');
            container.innerHTML = `<div class="alert alert-${type}"><i class="fas ${icon}"></i> ${msg}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 4500);
        }

        // ========== GLOBAL DATA ==========
        let students = [];
        let programs = [];

        // ========== LOAD PROGRAMS ==========
        async function loadPrograms() {
            const res = await safeApiCall('/api/admin/programs');
            if (res && res.ok) {
                programs = await res.json();
            } else {
                programs = [
                    { id: 1, program_name: 'Bachelor of Computer Science', program_code: 'BSC-CS' },
                    { id: 2, program_name: 'Bachelor of Business Administration', program_code: 'BBA-BM' },
                    { id: 3, program_name: 'Bachelor of Accounting and Finance', program_code: 'BAF' },
                    { id: 4, program_name: 'Diploma in Information Technology', program_code: 'DIP-IT' }
                ];
            }
            const programSelect = document.getElementById('programId');
            const editProgramSelect = document.getElementById('editProgramId');
            if (programSelect) programSelect.innerHTML = programs.map(p => `<option value="${p.id}">${escapeHtml(p.program_name)}</option>`).join('');
            if (editProgramSelect) editProgramSelect.innerHTML = programs.map(p => `<option value="${p.id}">${escapeHtml(p.program_name)}</option>`).join('');
        }

        // ========== LOAD STUDENTS ==========
        async function loadStudents(search = '') {
            const tbody = document.getElementById('studentsTableBody');
            tbody.innerHTML = `<tr><td colspan="8"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading students...</div></td></tr>`;
            const res = await safeApiCall('/api/admin/students');
            if (res && res.ok) {
                students = await res.json();
                displayStudents(students, search);
            } else {
                // demo data
                students = [
                    { id: 1, student_number: 'GIPS/2026/00001', first_name: 'John', last_name: 'Doe', email: 'john@example.com', phone: '+26771123456', program_name: 'Computer Science', program_id: 1, admission_status: 'accepted', academic_status: 'good_standing', registration_status: 'approved' },
                    { id: 2, student_number: 'GIPS/2026/00002', first_name: 'Jane', last_name: 'Smith', email: 'jane@example.com', phone: '+26771234567', program_name: 'Business Administration', program_id: 2, admission_status: 'pending', academic_status: 'good_standing', registration_status: 'pending' },
                    { id: 3, student_number: 'GIPS/2026/00003', first_name: 'Mike', last_name: 'Johnson', email: 'mike@example.com', phone: '+26771345678', program_name: 'Accounting', program_id: 3, admission_status: 'accepted', academic_status: 'good_standing', registration_status: 'approved' },
                    { id: 4, student_number: 'GIPS/2026/00004', first_name: 'Sarah', last_name: 'Williams', email: 'sarah@example.com', phone: '+26771456789', program_name: 'Information Technology', program_id: 4, admission_status: 'pending', academic_status: 'good_standing', registration_status: 'pending' }
                ];
                displayStudents(students, search);
            }
        }

        function displayStudents(data, search = '') {
            const tbody = document.getElementById('studentsTableBody');
            let filtered = data;
            if (search) {
                const term = search.toLowerCase();
                filtered = data.filter(s =>
                    (s.first_name || '').toLowerCase().includes(term) ||
                    (s.last_name || '').toLowerCase().includes(term) ||
                    (s.email || '').toLowerCase().includes(term) ||
                    (s.student_number || '').toLowerCase().includes(term)
                );
            }
            if (!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="8">No students found</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(s => {
                const admissionClass = s.admission_status === 'accepted' || s.admission_status === 'approved' ? 'status-approved' : (s.admission_status === 'pending' ? 'status-pending' : 'status-rejected');
                const regClass = s.registration_status === 'approved' ? 'status-approved' : 'status-pending';
                return `
                <tr>
                    <td>${s.id}</td>
                    <td><strong>${escapeHtml(s.student_number || 'N/A')}</strong></td>
                    <td>${escapeHtml(s.first_name)} ${escapeHtml(s.last_name)}</td>
                    <td>${escapeHtml(s.email)}</td>
                    <td>${escapeHtml(s.program_name || 'N/A')}</td>
                    <td><span class="status-badge ${admissionClass}">${escapeHtml(s.admission_status || 'pending')}</span></td>
                    <td><span class="status-badge ${regClass}">${escapeHtml(s.registration_status || 'pending')}</span></td>
                    <td>
                        <button class="btn btn-warning" onclick="editStudent(${s.id})" style="margin-right:5px"><i class="fas fa-edit"></i> Edit</button>
                        ${s.admission_status === 'pending' ? `
                            <button class="btn btn-success" onclick="approveStudent(${s.id})" style="margin-right:5px"><i class="fas fa-check"></i> Approve</button>
                            <button class="btn btn-danger" onclick="rejectStudent(${s.id})"><i class="fas fa-times"></i> Reject</button>
                        ` : ''}
                    </td>
                </tr>
            `;
            }).join('');
        }

        function searchStudents() {
            const term = document.getElementById('searchInput').value;
            displayStudents(students, term);
        }

        // ========== CRUD & ACTIONS ==========
        async function approveStudent(id) {
            if (!confirm('Approve this student registration?')) return;
            const res = await safeApiCall(`/api/admin/students/${id}/approve`, { method: 'POST' });
            if (res && res.ok) {
                showMessage('Student approved successfully', 'success');
                loadStudents();
            } else {
                const student = students.find(s => s.id === id);
                if (student) { student.admission_status = 'accepted'; student.registration_status = 'approved'; }
                displayStudents(students, document.getElementById('searchInput').value);
                showMessage('Student approved (Demo Mode)', 'success');
            }
        }

        async function rejectStudent(id) {
            if (!confirm('Reject this student registration?')) return;
            const res = await safeApiCall(`/api/admin/students/${id}/reject`, { method: 'POST' });
            if (res && res.ok) {
                showMessage('Student rejected', 'error');
                loadStudents();
            } else {
                const student = students.find(s => s.id === id);
                if (student) { student.admission_status = 'rejected'; }
                displayStudents(students, document.getElementById('searchInput').value);
                showMessage('Student rejected (Demo Mode)', 'error');
            }
        }

        async function addStudent(payload) {
            const res = await safeApiCall('/api/admin/students', { method: 'POST', body: JSON.stringify(payload) });
            if (res && res.ok) {
                const newStudent = await res.json();
                students.push(newStudent);
                displayStudents(students, '');
                showMessage(`Student ${payload.first_name} ${payload.last_name} created`, 'success');
            } else {
                const program = programs.find(p => p.id === parseInt(payload.program_id));
                const newId = students.length + 1;
                const newStudent = {
                    id: newId,
                    student_number: `GIPS/2026/${String(newId).padStart(5, '0')}`,
                    first_name: payload.first_name,
                    last_name: payload.last_name,
                    email: payload.email,
                    phone: payload.phone,
                    program_name: program ? program.program_name : 'N/A',
                    program_id: payload.program_id,
                    admission_status: payload.admission_status,
                    academic_status: 'good_standing',
                    registration_status: 'pending'
                };
                students.push(newStudent);
                displayStudents(students, '');
                showMessage(`Student ${payload.first_name} ${payload.last_name} created (Demo)`, 'success');
            }
        }

        async function updateStudent(id, payload) {
            const res = await safeApiCall(`/api/admin/students/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
            if (res && res.ok) {
                const updated = await res.json();
                const idx = students.findIndex(s => s.id === id);
                if (idx !== -1) students[idx] = updated;
                displayStudents(students, '');
                showMessage('Student updated successfully', 'success');
            } else {
                const idx = students.findIndex(s => s.id === id);
                if (idx !== -1) {
                    const program = programs.find(p => p.id === parseInt(payload.program_id));
                    students[idx] = { ...students[idx], ...payload, program_name: program ? program.program_name : students[idx].program_name };
                    displayStudents(students, '');
                    showMessage('Student updated (Demo Mode)', 'success');
                }
            }
        }

        // ========== MODAL HANDLERS ==========
        function openAddStudentModal() {
            document.getElementById('addStudentForm').reset();
            document.getElementById('addStudentModal').style.display = 'flex';
        }

        function editStudent(id) {
            const student = students.find(s => s.id === id);
            if (student) {
                document.getElementById('editStudentId').value = student.id;
                document.getElementById('editFirstName').value = student.first_name || '';
                document.getElementById('editLastName').value = student.last_name || '';
                document.getElementById('editEmail').value = student.email || '';
                document.getElementById('editPhone').value = student.phone || '';
                document.getElementById('editProgramId').value = student.program_id || '';
                document.getElementById('editAdmissionStatus').value = student.admission_status || 'pending';
                document.getElementById('editAcademicStatus').value = student.academic_status || 'good_standing';
                document.getElementById('editStudentModal').style.display = 'flex';
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // ========== FORM SUBMISSIONS ==========
        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                program_id: parseInt(document.getElementById('programId').value),
                password: document.getElementById('password').value,
                admission_status: document.getElementById('admissionStatus').value
            };
            await addStudent(payload);
            closeModal('addStudentModal');
        });

        document.getElementById('editStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = parseInt(document.getElementById('editStudentId').value);
            const payload = {
                first_name: document.getElementById('editFirstName').value,
                last_name: document.getElementById('editLastName').value,
                email: document.getElementById('editEmail').value,
                phone: document.getElementById('editPhone').value,
                program_id: parseInt(document.getElementById('editProgramId').value),
                admission_status: document.getElementById('editAdmissionStatus').value,
                academic_status: document.getElementById('editAcademicStatus').value
            };
            await updateStudent(id, payload);
            closeModal('editStudentModal');
        });

        // ========== LOGOUT ==========
        document.addEventListener('click', (e) => {
            if (e.target.id === 'logoutLink' || e.target.closest('#logoutLink')) {
                e.preventDefault();
                localStorage.clear();
                window.location.href = 'login.html';
            }
        });

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function (m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        // ========== INIT ==========
        async function init() {
            await loadPrograms();
            await loadStudents();
        }
        init();

        // Expose globals
        window.searchStudents = searchStudents;
        window.openAddStudentModal = openAddStudentModal;
        window.editStudent = editStudent;
        window.approveStudent = approveStudent;
        window.rejectStudent = rejectStudent;
        window.closeModal = closeModal;
    </script>
</body>

</html>
