<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <meta name="theme-color" content="#667eea">
    <meta name="msapplication-TileColor" content="#667eea">
    <!-- Favicon -->
    
    
    
    
    

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>System Settings - Admin | GIPS College</title>
    <!-- Font Awesome 6 (top notch icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            overflow-x: hidden;
        }

        /* Admin Wrapper */
        .admin-wrapper {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* Sidebar (premium gradient + same as admin pages) */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 260px;
            }

            .sidebar.open {
                transform: translateX(0);
            }
        }

        .sidebar-header {
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header img {
            height: 55px;
            width: auto;
            margin-bottom: 12px;
        }

        .sidebar-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .sidebar-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #cbd5e1;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
            border-left: 3px solid transparent;
        }

        .sidebar-menu-item i {
            width: 24px;
            font-size: 1.1rem;
            text-align: center;
        }

        .sidebar-menu-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .sidebar-menu-item.active {
            background: rgba(102, 126, 234, 0.2);
            color: white;
            border-left-color: #667eea;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 20px 24px;
            transition: margin-left 0.3s;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 16px;
            }
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            background: white;
            padding: 16px 24px;
            border-radius: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
        }

        .page-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .page-title p {
            color: #475569;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .admin-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .admin-avatar:hover {
            transform: scale(1.03);
        }

        /* Hamburger Button */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #1e293b;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .top-bar {
                padding: 12px 16px;
            }
        }

        /* Settings Grid (responsive) */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        /* Settings Card */
        .settings-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
        }

        .settings-card:hover {
            transform: translateY(-2px);
            border-color: #cbd5e1;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .settings-card h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 12px;
        }

        .settings-card h2 i {
            color: #667eea;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #334155;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Toggle Switch (modern) */
        .toggle-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: 0.3s;
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked+.toggle-slider {
            background-color: #667eea;
        }

        input:checked+.toggle-slider:before {
            transform: translateX(26px);
        }

        /* Buttons */
        .btn {
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        hr {
            margin: 16px 0;
            border: none;
            border-top: 1px solid #e2e8f0;
        }

        /* Status Message */
        .status-message {
            margin-bottom: 20px;
        }

        .alert {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid;
        }

        .alert-success {
            background: #dcfce7;
            color: #15803d;
            border-left-color: #22c55e;
        }

        .alert-error {
            background: #fee2e2;
            color: #b91c1c;
            border-left-color: #ef4444;
        }

        .alert-warning {
            background: #fef9c3;
            color: #854d0e;
            border-left-color: #facc15;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer {
            text-align: center;
            padding: 24px 0;
            margin-top: 20px;
            color: #64748b;
            font-size: 0.75rem;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 640px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }

            .settings-card {
                padding: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="/css/portal-common.css">
</head>

<body>

<script>
// ========== ROLE CHECK ==========
(function() {
    const token = localStorage.getItem('access_token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const userRole = user.role || localStorage.getItem('user_role');
    if (!token) {
        window.location.href = 'login.html';
        return;
    }
    const allowedRoles = ['admin', 'administrator'];
    if (allowedRoles.length > 0 && !allowedRoles.includes(userRole)) {
        const roleRedirects = {
            'admin': 'admin-dashboard.html',
            'administrator': 'admin-dashboard.html',
            'registrar': 'registrar-dashboard.html',
            'finance': 'finance-dashboard.html',
            'lecturer': 'lecturer-dashboard.html',
            'staff': 'staff-dashboard.html',
            'student': 'student-dashboard.html',
            'alumni': 'alumni-dashboard.html'
        };
        const target = roleRedirects[userRole] || 'student-dashboard.html';
        window.location.href = target;
        return;
    }
})();
</script>

    <div class="admin-wrapper">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../images/gipslogo.jpg" alt="GIPS College" onerror="this.style.display='none'">
                <h3 id="portalTitle">Admin Portal</h3>
                <p>GIPS College</p>
            </div>
            <div class="sidebar-menu" id="sidebarMenu"></div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                    <div class="page-title">
                        <h1><i class="fas fa-sliders-h"></i> System Settings</h1>
                        <p>Configure college preferences, fees, security & maintenance</p>
                    </div>
                </div>
                <div class="admin-avatar" id="adminAvatar">A</div>
            </div>

            <div id="statusMessage" class="status-message"></div>

            <div class="settings-grid">
                <!-- General Settings Card -->
                <div class="settings-card">
                    <h2><i class="fas fa-globe-africa"></i> General</h2>
                    <div class="form-group"><label><i class="fas fa-university"></i> College Name</label><input
                            type="text" id="collegeName"></div>
                    <div class="form-group"><label><i class="fas fa-envelope"></i> College Email</label><input
                            type="email" id="collegeEmail"></div>
                    <div class="form-group"><label><i class="fas fa-phone-alt"></i> Phone</label><input type="text"
                            id="collegePhone"></div>
                    <div class="form-group"><label><i class="fas fa-map-pin"></i> Address</label><textarea
                            id="collegeAddress" rows="2"></textarea></div>
                    <button class="btn btn-primary" onclick="saveGeneralSettings()"><i class="fas fa-save"></i> Save
                        General</button>
                </div>

                <!-- Academic Settings -->
                <div class="settings-card">
                    <h2><i class="fas fa-calendar-alt"></i> Academic</h2>
                    <div class="form-group"><label><i class="fas fa-calendar-week"></i> Academic Year</label><select
                            id="academicYear"></select></div>
                    <div class="form-group"><label><i class="fas fa-chalkboard"></i> Current Semester</label><select
                            id="currentSemester">
                            <option value="1">Semester 1 (Jul-Dec)</option>
                            <option value="2">Semester 2 (Jan-Jun)</option>
                        </select></div>
                    <div class="form-group"><label><i class="fas fa-calendar-check"></i> Registration
                            Start</label><input type="date" id="regStart"></div>
                    <div class="form-group"><label><i class="fas fa-calendar-times"></i> Registration End</label><input
                            type="date" id="regEnd"></div>
                    <div class="form-group"><label><i class="fas fa-money-bill-wave"></i> Late Fee (P)</label><input
                            type="number" id="lateFee"></div>
                    <button class="btn btn-primary" onclick="saveAcademicSettings()"><i class="fas fa-save"></i> Save
                        Academic</button>
                </div>

                <!-- Fee Structure -->
                <div class="settings-card">
                    <h2><i class="fas fa-coins"></i> Fee Structure</h2>
                    <div class="form-group"><label><i class="fas fa-file-invoice"></i> Application Fee (P)</label><input
                            type="number" id="appFee"></div>
                    <div class="form-group"><label><i class="fas fa-id-card"></i> Registration Fee (P)</label><input
                            type="number" id="regFee"></div>
                    <div class="form-group"><label><i class="fas fa-pencil-ruler"></i> Exam Fee / Module
                            (P)</label><input type="number" id="examFee"></div>
                    <div class="form-group"><label><i class="fas fa-bed"></i> Accommodation Deposit (P)</label><input
                            type="number" id="accomDeposit"></div>
                    <button class="btn btn-primary" onclick="saveFeeSettings()"><i class="fas fa-save"></i> Save
                        Fees</button>
                </div>

                <!-- Notifications -->
                <div class="settings-card">
                    <h2><i class="fas fa-bell"></i> Notifications</h2>
                    <div class="toggle-label"><label><i class="fas fa-envelope-open-text"></i> Email
                            Alerts</label><label class="toggle-switch"><input type="checkbox"
                                id="emailNotifications"><span class="toggle-slider"></span></label></div>
                    <div class="toggle-label"><label><i class="fas fa-sms"></i> SMS Alerts</label><label
                            class="toggle-switch"><input type="checkbox" id="smsNotifications"><span
                                class="toggle-slider"></span></label></div>
                    <div class="toggle-label"><label><i class="fas fa-bell"></i> Push Notifications</label><label
                            class="toggle-switch"><input type="checkbox" id="pushNotifications"><span
                                class="toggle-slider"></span></label></div>
                    <button class="btn btn-primary" onclick="saveNotificationSettings()"><i class="fas fa-save"></i>
                        Save Notifications</button>
                </div>

                <!-- Security Settings -->
                <div class="settings-card">
                    <h2><i class="fas fa-shield-alt"></i> Security</h2>
                    <div class="form-group"><label><i class="fas fa-hourglass-half"></i> Session Timeout
                            (min)</label><input type="number" id="sessionTimeout"></div>
                    <div class="form-group"><label><i class="fas fa-fingerprint"></i> Max Login Attempts</label><input
                            type="number" id="maxAttempts"></div>
                    <div class="toggle-label"><label><i class="fas fa-mobile-alt"></i> Require 2FA for
                            Staff</label><label class="toggle-switch"><input type="checkbox" id="twoFactorAuth"><span
                                class="toggle-slider"></span></label></div>
                    <div class="toggle-label"><label><i class="fas fa-key"></i> Strong Password Policy</label><label
                            class="toggle-switch"><input type="checkbox" id="strongPassword"><span
                                class="toggle-slider"></span></label></div>
                    <button class="btn btn-primary" onclick="saveSecuritySettings()"><i class="fas fa-save"></i> Save
                        Security</button>
                </div>

                <!-- Backup & Maintenance -->
                <div class="settings-card">
                    <h2><i class="fas fa-database"></i> Backup & Maintenance</h2>
                    <div class="form-group"><label><i class="fas fa-clock"></i> Auto Backup</label><select
                            id="backupFrequency">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select></div>
                    <div class="form-group"><label><i class="fas fa-hourglass-start"></i> Backup Time</label><input
                            type="time" id="backupTime"></div>
                    <button class="btn btn-success" onclick="backupNow()" style="width:100%; margin-bottom:10px;"><i
                            class="fas fa-download"></i> Run Backup Now</button>
                    <button class="btn btn-warning" onclick="clearCache()" style="width:100%; margin-bottom:10px;"><i
                            class="fas fa-broom"></i> Clear System Cache</button>
                    <hr>
                    <div class="toggle-label"><label><i class="fas fa-tools"></i> Maintenance Mode</label><label
                            class="toggle-switch"><input type="checkbox" id="maintenanceMode"><span
                                class="toggle-slider"></span></label></div>
                    <button class="btn btn-danger" onclick="toggleMaintenance()" style="width:100%;"><i
                            class="fas fa-power-off"></i> Apply Maintenance</button>
                </div>
            </div>
            <div class="footer">© 2026 GIPS College. All rights reserved.</div>
        </div>
    </div>

    

</body>

</html>
